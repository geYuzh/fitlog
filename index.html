<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>FitLog 健身记录</title>
<link rel="manifest" href="manifest.json">
<script src="chart.umd.min.js"></script>
<script src="hammer.min.js"></script>

<script src="app.js?v=20260629" defer></script>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#333;--text:#e8e8e8;--text2:#999;--accent:#ff6b35;--accent2:#4ecdc4;--green:#2ecc71;--red:#e74c3c;--radius:12px;--nav-h:64px;--header-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;padding-top:max(env(safe-area-inset-top, 0px), 24px);height:calc(var(--header-h) + max(env(safe-area-inset-top, 0px), 24px));display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header h1 span{color:var(--accent)}
.header-date{font-size:13px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:20px}
.main{padding:0 0 calc(var(--nav-h)+var(--safe-bottom)+16px);min-height:calc(100dvh - var(--header-h))}
.tab-panel{display:none;padding:16px}
.tab-panel.active{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);height:calc(var(--nav-h)+var(--safe-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;background:none;color:var(--text2);cursor:pointer;font-size:10px;gap:2px;transition:color .2s;font-family:inherit;padding:0 2px}
.nav-btn.active{color:var(--accent)}
.nav-btn .nav-icon{font-size:20px}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.exercise-input-wrapper{display:flex;gap:8px;align-items:stretch}
.exercise-input-wrapper input{flex:1}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-block{width:100%}
.btn-icon{padding:8px;min-width:36px;display:flex;align-items:center;justify-content:center}
.btn-cat{width:44px;height:44px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.btn-cat:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.1)}
.set-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:6px}
.set-row .set-num{color:var(--text2);font-size:13px;min-width:24px}
.set-row input{flex:1;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;text-align:center;min-width:0}
.set-row .set-label{font-size:11px;color:var(--text2)}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.preset-chip{padding:4px 10px;border-radius:14px;font-size:12px;background:var(--surface2);color:var(--text2);border:1px solid transparent;cursor:pointer;transition:all .2s}
.preset-chip.selected,.preset-chip:hover{background:rgba(255,107,53,.15);color:var(--accent);border-color:var(--accent)}
.sub-chip{margin-left:20px;font-size:11px;background:var(--bg)}
/* Category Picker */
.cat-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.cat-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;font-family:inherit}
.cat-tab.active,.cat-tab:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.ex-chips{display:flex;flex-wrap:wrap;gap:8px}
.ex-chip{padding:10px 16px;border-radius:8px;background:var(--surface2);color:var(--text);cursor:pointer;font-size:14px;transition:all .2s;border:1px solid var(--border)}
.ex-chip:hover{background:rgba(255,107,53,.15);border-color:var(--accent);color:var(--accent)}
/* Settings */
.settings-cat{margin-bottom:16px;background:var(--surface2);border-radius:8px;padding:12px}
.settings-cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.settings-cat-name{font-weight:600;font-size:14px;color:var(--accent)}
.settings-ex-list{margin-bottom:8px}
.settings-ex-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin:2px 0;background:var(--surface);border-radius:6px;font-size:13px}
/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-header .month-label{font-size:16px;font-weight:600}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text2);margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;position:relative;transition:background .15s}
.cal-day:hover{background:var(--surface2)}
.cal-day.other-month{color:#444}
.cal-day.today{background:rgba(255,107,53,.15);font-weight:700;color:var(--accent)}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day .dot{width:5px;height:5px;border-radius:50%;position:absolute;bottom:4px;background:var(--accent2)}
.day-detail{margin-top:12px}
.workout-item{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--accent)}
.workout-item .wo-exercise{font-weight:600;font-size:14px}
.workout-item .wo-sets{font-size:12px;color:var(--text2);margin-top:2px}
.workout-item .wo-actions{display:flex;gap:4px;margin-top:6px}
.chart-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.chart-filter .preset-chip{font-size:11px}
.chart-container{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border);position:relative}

.history-filters{display:flex;gap:8px;margin-bottom:12px}
.history-filters input{flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.history-list .wo-date{font-size:11px;color:var(--accent)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.stats-bar{display:flex;gap:8px;margin-bottom:16px}
.stat-card{flex:1;background:var(--surface);border-radius:var(--radius);padding:12px;text-align:center;border:1px solid var(--border)}
.stat-card .stat-val{font-size:20px;font-weight:700;color:var(--accent)}
.stat-card .stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;display:flex;align-items:center;justify-content:center}
.modal-sheet{background:var(--surface);border-radius:16px;padding:20px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#555;border-radius:2px;margin:0 auto 16px}

/* Settings Menu */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .15s;border:1px solid var(--border)}
.settings-row:hover{background:var(--surface2)}
.settings-row-left{display:flex;align-items:center;gap:12px}
.settings-row-icon{font-size:22px;width:36px;text-align:center}
.settings-row-title{font-size:15px;font-weight:600}
.settings-row-desc{font-size:12px;color:var(--text2);margin-top:2px}
.settings-row-arrow{font-size:20px;color:var(--text2)}
.settings-back{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;font-size:14px;color:var(--accent)}
.settings-back:hover{opacity:.8}
/* Light Theme */
body.theme-light{--bg:#f5f5f5;--surface:#fff;--surface2:#eee;--border:#ddd;--text:#222;--text2:#888;--accent:#ff6b35}
/* Ocean Theme */
body.theme-ocean{--bg:#0a1628;--surface:#112240;--surface2:#1a3350;--border:#1e4068;--text:#ccd6f6;--text2:#8892b0;--accent:#38bdf8}
/* Forest Theme */
body.theme-forest{--bg:#0d1f0d;--surface:#162816;--surface2:#1e361e;--border:#2a4a2a;--text:#d4e8d4;--text2:#8ab88a;--accent:#4ade80}
/* Sunset Theme */
body.theme-sunset{--bg:#1a0f0a;--surface:#261912;--surface2:#332419;--border:#4a3222;--text:#f0e0d0;--text2:#b8956e;--accent:#fb923c}
/* Purple Theme */
body.theme-purple{--bg:#120818;--surface:#1c0f26;--surface2:#261633;--border:#3a224a;--text:#e8d5f5;--text2:#a78bbf;--accent:#c084fc}
/* Theme Options */
.theme-option{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface2);border-radius:10px;margin-bottom:8px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.theme-option.selected{border-color:var(--accent)}
.theme-option:hover{border-color:var(--accent)}
.theme-icon{font-size:26px;width:36px;text-align:center}
.theme-name{font-size:15px;font-weight:600}
.theme-desc{font-size:12px;color:var(--text2);margin-top:2px}
.theme-check{font-size:20px;color:var(--accent);margin-left:auto}
/* Weight adjust buttons */
.btn-wadj{width:28px;height:34px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit;line-height:1}
.btn-wadj:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-wadj:active{transform:scale(.92)}
.set-input-wrap{position:relative;flex:1;min-width:0}
.set-input-wrap input{width:100%;padding:5px 24px 5px 6px!important;text-align:center}
.set-weight::-webkit-outer-spin-button,.set-weight::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.set-weight{-moz-appearance:textfield}
.set-reps::-webkit-outer-spin-button,.set-reps::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.set-reps{-moz-appearance:textfield}
/* Rep adjust stacked buttons */
.radj-stack{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.btn-radj-up,.btn-radj-down{width:22px;height:18px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit;line-height:1;padding:0}
.btn-radj-up:hover,.btn-radj-down:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-radj-up:active,.btn-radj-down:active{transform:scale(.9)}
.set-unit{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text2);pointer-events:none}
/* Category toggle */
.settings-cat-toggle{display:inline-block;width:16px;font-size:12px;color:var(--text2);transition:transform .2s}
.settings-cat-header{gap:8px}
/* Rep quick select chips */
.rep-chip{padding:3px 8px;border-radius:10px;font-size:12px;font-weight:600;background:var(--surface);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s;flex-shrink:0}
.rep-chip:hover,.rep-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Weight vertical adjust */
.wadj-stack{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.btn-wadj-up,.btn-wadj-down{width:22px;height:18px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit;line-height:1;padding:0}
.btn-wadj-up:hover,.btn-wadj-down:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-wadj-up:active,.btn-wadj-down:active{transform:scale(.9)}
/* Rep dropdown menu */
.rep-menu-wrap{position:relative;flex-shrink:0}
.btn-rep-menu{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s;padding:0;line-height:1}
.btn-rep-menu:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.rep-menu-drop{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:50;flex-direction:column;gap:2px;min-width:40px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.rep-menu-drop .rep-chip{text-align:center;padding:5px 10px;border-radius:6px}
/* Month groups in history */
.month-group{margin-bottom:4px}
.month-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border-radius:10px;cursor:pointer;border:1px solid var(--border);transition:background .15s}
.month-header:hover{background:var(--surface2)}
.month-toggle{font-size:12px;color:var(--accent);width:16px}
.month-label{font-size:15px;font-weight:600;flex:1}
.month-count{font-size:12px;color:var(--text2)}
.month-body{padding:4px 0 8px 0}
/* Chart slider */
.chart-slider{width:100%;margin-top:12px;-webkit-appearance:none;appearance:none;height:6px;background:var(--surface2);border-radius:3px;outline:none;cursor:pointer}
.chart-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
.chart-slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}/* === Mobile Simulator on Desktop === */
@media (min-width: 600px) {
  html{background:#1a1a1a;display:flex;justify-content:center}
  body{max-width:430px;width:100%;min-height:100dvh;box-shadow:0 0 40px rgba(0,0,0,.6);position:relative}
  .bottom-nav{max-width:430px;left:50%;transform:translateX(-50%)}
  .container-reset{max-width:430px}
}
@media (min-width: 430px) {
  .set-row{gap:6px;padding:8px 10px}
}

/* === Fix cramped chart labels === */


  .chart-filter{gap:4px}
  .chart-filter .preset-chip{font-size:10px;padding:3px 8px}
  .cal-day{font-size:11px}
  .cal-weekdays{font-size:10px}
  .cal-header .month-label{font-size:14px}
  .set-row input{font-size:13px;padding:5px 4px!important}
  .set-row{gap:4px;padding:6px 8px}
  .btn-wadj{width:26px;height:30px;font-size:14px}
  .rep-chip{padding:2px 6px;font-size:11px}
  .stat-card .stat-val{font-size:16px}
  .cat-tab{padding:6px 12px;font-size:12px}
}



















/* === Large charts, stacked === */
.chart-container {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  width: 100%;
}
.chart-container .card-title {
  margin-bottom: 4px;
  font-size: 14px;
}
.chart-container .chart-filter {
  margin-bottom: 4px;
}
.chart-container canvas {
  width: 100% !important;
  height: 300px !important;
  max-height: 300px !important;
}
.chart-container .chart-slider {
  margin-top: 6px;
}
@media (max-width: 430px) {
  .chart-container canvas { height: 260px !important; max-height: 260px !important; }
}
#panel-charts {
  padding: 4px 4px 120px 4px;
}

</style>
</head>
<body>
<div class="header">
  <h1>Fit<span>Log</span></h1>
  <div class="header-date" id="todayLabel"></div>
</div>
<div class="main">
  <!-- RECORD -->
  <div class="tab-panel active" id="panel-record">
    <div class="stats-bar" id="statsBar"></div>
    <div class="card">
      <div class="card-title">新增训练记录</div>
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="recDate">
      </div>
      <div class="form-group">
        <label>训练项目</label>
        <div class="exercise-input-wrapper">
          <input type="text" id="recExercise" placeholder="输入项目名称或点击右侧图标选择..." autocomplete="off">
          <button class="btn-cat" type="button" onclick="openCategoryPicker()" title="分类选择">&#128218;</button>
        </div>
        <div class="presets" id="exercisePresets"></div>
      </div>
      <div class="form-group">
        <label>组数明细</label>
        <div id="setsContainer"></div>
        <button class="btn btn-outline btn-sm" type="button" onclick="addSet()" style="margin-top:4px">+ 添加一组</button>
      </div>
      <button class="btn btn-primary btn-block" type="button" onclick="saveWorkout()" style="margin-top:12px">保存记录</button>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="tab-panel" id="panel-charts">
    <div class="chart-filter" id="chartFilter"></div>
    <div class="chart-container">
      <div class="card-title">重量趋势（每组独立折线）</div>
      <div class="chart-filter" id="setTabs" style="margin-bottom:8px"></div>
      <canvas id="chartWeight"></canvas>
      <input type="range" class="chart-slider" id="chartSlider" min="0" max="100" value="0" oninput="onSliderChange()">
    </div>
    <div class="chart-container">
      <div class="card-title">当日最重组</div>
      <canvas id="chartVolume"></canvas>
      <input type="range" class="chart-slider" id="chartSlider2" min="0" max="100" value="0" oninput="onSliderChange2()">
    </div>
    <div class="chart-container">
      <div class="card-title">训练频次</div>
      <canvas id="chartFreq"></canvas>
      <input type="range" class="chart-slider" id="chartSlider3" min="0" max="100" value="0" oninput="onSliderChange3()">
    </div>
  </div>

  <!-- HISTORY -->
  <div class="tab-panel" id="panel-history">
    <div class="history-filters">
      <input type="text" id="historySearch" placeholder="搜索项目或日期，如卧推、2005..." oninput="renderHistory()">
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- SETTINGS -->
  <div class="tab-panel" id="panel-settings">
    <!-- Settings Menu -->
    <div id="settingsMenu">
      <div class="settings-row" onclick="openSetting('categories')">
        <div class="settings-row-left">
          <span class="settings-row-icon">&#128218;</span>
          <div>
            <div class="settings-row-title">训练项目标识编辑</div>
            <div class="settings-row-desc">管理分类和训练项目</div>
          </div>
        </div>
        <span class="settings-row-arrow">&#8250;</span>
      </div>
      <div class="settings-row" onclick="openSetting('theme')">
        <div class="settings-row-left">
          <span class="settings-row-icon">&#127912;</span>
          <div>
            <div class="settings-row-title">主题</div>
            <div class="settings-row-desc">切换深色 / 浅色模式</div>
          </div>
        </div>
        <span class="settings-row-arrow">&#8250;</span>
      </div>
      <div class="settings-row" onclick="openSetting('increment')">
        <div class="settings-row-left">
          <span class="settings-row-icon">&#9881;</span>
          <div>
            <div class="settings-row-title">重量每次增加设置</div>
            <div class="settings-row-desc">调节 +/- 按钮的增减幅度（默认 2.5kg）</div>
          </div>
        </div>
        <span class="settings-row-arrow">&#8250;</span>
      </div>
      <div class="settings-row" onclick="openSetting('historyExpand')">
        <div class="settings-row-left">
          <span class="settings-row-icon">&#128196;</span>
          <div>
            <div class="settings-row-title">历史的分级展开设置</div>
            <div class="settings-row-desc">设置年份和月份的默认展开状态</div>
          </div>
        </div>
        <span class="settings-row-arrow">&#8250;</span>
      </div>
      <div class="settings-row" onclick="openSetting('about')">
        <div class="settings-row-left">
          <span class="settings-row-icon">&#8505;</span>
          <div>
            <div class="settings-row-title">关于</div>
            <div class="settings-row-desc">FitLog 版本信息</div>
          </div>
        </div>
        <span class="settings-row-arrow">&#8250;</span>
      </div>
          <div class="settings-row" onclick="openSetting('debugData')">
        <div class="settings-row-left">
          <span class="settings-row-icon">&#128295;</span>
          <div>
            <div class="settings-row-title">调试数据测试</div>
            <div class="settings-row-desc">生成测试用的训练记录</div>
          </div>
        </div>
        <span class="settings-row-arrow">&#8250;</span>
      </div>
</div>
    <!-- Sub-panels -->
    <div id="settingSubpanel" style="display:none"></div>
  </div>
</div>

  </button>

  <button class="nav-btn" data-tab="charts" onclick="switchTab('charts')">
    <span class="nav-icon">&#128200;</span>图表
  </button>
  <button class="nav-btn" data-tab="history" onclick="switchTab('history')">

<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" style="display:none" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="card-title" style="margin-bottom:12px">编辑记录</div>
    <input type="hidden" id="editId">
    <div class="form-group"><label>日期</label><input type="date" id="editDate"></div>
    <div class="form-group"><label>训练项目</label><input type="text" id="editExercise"></div>
    <div class="form-group"><label>组数明细</label><div id="editSetsContainer"></div><button class="btn btn-outline btn-sm" type="button" onclick="addEditSet()">+ 添加一组</button></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" type="button" onclick="saveEdit()" style="flex:1">保存</button>
      <button class="btn btn-danger" type="button" onclick="deleteEdit()">删除</button>
    </div>
  </div>
</div>

<!-- CATEGORY PICKER MODAL -->
<div class="modal-overlay" id="catPickerModal" style="display:none" onclick="if(event.target===this)closeCategoryPicker()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="card-title" style="margin-bottom:4px">选择训练项目</div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:12px">先选分类，再选具体项目。可在「设置」页编辑分类。</p>
    <div class="cat-tabs" id="catList"></div>
    <div class="ex-chips" id="catExList"></div>
  </div>
</div>
