name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Enable landscape orientation
        run: |
          # Remove any screenOrientation lock from manifest
          sed -i 's/android:screenOrientation="portrait"/android:screenOrientation="fullSensor"/g' android/app/src/main/AndroidManifest.xml
          # Add if not present
          if ! grep -q 'screenOrientation' android/app/src/main/AndroidManifest.xml; then
            sed -i 's/<activity /<activity android:screenOrientation="fullSensor" /' android/app/src/main/AndroidManifest.xml
          fi

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitLog-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
